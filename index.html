<html lang="en">
<head>
<meta charset="UTF-8">

<title>Luxembourg Fund Vehicle Decision Tree</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --lux-blue: #2B6CB0;
    --lux-blue-light: #4299E1;
    --lux-blue-pale: #EBF4FF;
    --lux-navy: #1A365D;
    --lux-teal: #2C7A7B;
    --lux-gold: #B7791F;
    --lux-gold-light: #FAF089;
    --lux-green: #276749;
    --lux-green-light: #C6F6D5;
    --lux-gray: #4A5568;
    --lux-gray-light: #F7FAFC;
    --lux-gray-border: #E2E8F0;
    --white: #FFFFFF;
    --text-dark: #1A202C;
    --text-mid: #4A5568;
    --shadow: 0 4px 24px rgba(26,54,93,0.10);
    --shadow-hover: 0 8px 32px rgba(26,54,93,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #DCE8F5;
    color: var(--text-dark);
    min-height: 100vh;
  }



  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* BREADCRUMB TRAIL */
  .trail {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
    margin-bottom: 32px;
    min-height: 28px;
  }
  .trail-item {
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--lux-blue);
    background: var(--lux-blue-pale);
    border: 1px solid #BEE3F8;
    border-radius: 20px;
    padding: 3px 12px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .trail-item:hover { background: #BEE3F8; }
  .trail-sep {
    font-size: 0.7rem;
    color: var(--lux-gray);
  }
  .trail-start {
    font-size: 0.75rem;
    color: var(--lux-gray);
    font-weight: 400;
  }

  /* QUESTION CARD */
  .question-card {
    background: var(--white);
    border-radius: 16px;
    box-shadow: var(--shadow);
    padding: 36px 40px;
    margin-bottom: 24px;
    border-top: 4px solid var(--lux-blue);
    animation: slideIn 0.25s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .question-step {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--lux-blue);
    margin-bottom: 10px;
  }
  .question-text {
    font-family: 'Libre Baskerville', serif;
    font-size: 1.35rem;
    font-weight: 700;
    color: var(--lux-navy);
    line-height: 1.35;
    margin-bottom: 8px;
  }
  .question-sub {
    font-size: 0.85rem;
    color: var(--text-mid);
    margin-bottom: 28px;
    line-height: 1.5;
  }

  .options-grid {
    display: grid;
    gap: 12px;
  }
  .options-grid.cols-2 { grid-template-columns: 1fr 1fr; }
  .options-grid.cols-1 { grid-template-columns: 1fr; }

  .option-btn {
    background: var(--lux-gray-light);
    border: 2px solid var(--lux-gray-border);
    border-radius: 12px;
    padding: 18px 22px;
    cursor: pointer;
    text-align: left;
    transition: all 0.18s;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .option-btn:hover {
    border-color: var(--lux-blue-light);
    background: var(--lux-blue-pale);
    box-shadow: var(--shadow-hover);
    transform: translateY(-2px);
  }
  .option-label {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--lux-navy);
  }
  .option-desc {
    font-size: 0.78rem;
    color: var(--text-mid);
    font-weight: 400;
    line-height: 1.4;
  }

  /* RESULT CARD */
  .result-card {
    background: var(--white);
    border-radius: 16px;
    box-shadow: var(--shadow);
    overflow: hidden;
    animation: slideIn 0.3s ease;
  }

  .result-header {
    padding: 28px 36px 22px;
    background: var(--lux-navy);
    position: relative;
  }
  .result-label {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
    margin-bottom: 6px;
  }
  .result-vehicle {
    font-family: 'Libre Baskerville', serif;
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--white);
    line-height: 1.1;
  }
  .result-fullname {
    font-size: 0.85rem;
    color: rgba(255,255,255,0.65);
    margin-top: 6px;
    font-weight: 300;
    font-style: italic;
  }
  .result-badge {
    position: absolute;
    top: 24px;
    right: 28px;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 20px;
  }
  .badge-regulated { background: #C6F6D5; color: #22543D; }
  .badge-unregulated { background: #FEF3C7; color: #78350F; }
  .badge-retail { background: #BEE3F8; color: #1A365D; }

  .result-body {
    padding: 28px 36px;
  }

  .result-summary {
    font-size: 0.92rem;
    color: var(--text-mid);
    line-height: 1.6;
    margin-bottom: 28px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--lux-gray-border);
  }

  .specs-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
  }
  .spec-item {
    background: var(--lux-gray-light);
    border-radius: 10px;
    padding: 14px 16px;
  }
  .spec-label {
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--lux-blue);
    margin-bottom: 5px;
  }
  .spec-value {
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--lux-navy);
    line-height: 1.3;
  }
  .spec-note {
    font-size: 0.75rem;
    color: var(--text-mid);
    margin-top: 3px;
  }

  .also-consider {
    background: #FFFBEB;
    border: 1px solid #FDE68A;
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 24px;
  }
  .also-consider h4 {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--lux-gold);
    margin-bottom: 8px;
  }
  .alt-vehicles {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .alt-chip {
    font-size: 0.78rem;
    font-weight: 600;
    background: #FEF3C7;
    color: #78350F;
    border: 1px solid #FDE68A;
    border-radius: 20px;
    padding: 4px 12px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .alt-chip:hover { background: #FDE68A; }

  .restart-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--lux-navy);
    color: var(--white);
    border: none;
    border-radius: 10px;
    padding: 12px 24px;
    font-size: 0.88rem;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: background 0.18s;
  }
  .restart-btn:hover { background: var(--lux-blue); }

  @media (max-width: 600px) {
    header { padding: 20px 20px 18px; }
    .container { padding: 24px 16px 60px; }
    .question-card { padding: 24px 20px; }
    .options-grid.cols-2 { grid-template-columns: 1fr; }
    .specs-grid { grid-template-columns: 1fr; }
    .result-header { padding: 20px 22px 18px; }
    .result-body { padding: 20px 22px; }
    .result-vehicle { font-size: 1.4rem; }
    .result-badge { position: static; margin-top: 10px; display: inline-block; }
  }
</style>
</head>

// ─── STATE ───────────────────────────────────────────────────────────────────
let history = []; // [{nodeId, choiceLabel}]
let currentNode = "start";

// ─── RENDER ──────────────────────────────────────────────────────────────────

function getNode(id) {
  if (id === "start") return TREE;
  return NODES[id];
}

function render() {
  renderTrail();
  const node = getNode(currentNode);
  if (node.result) {
    renderResult(node.result);
  } else {
    renderQuestion(node);
  }
}

function renderTrail() {
  const trail = document.getElementById("trail");
  if (history.length === 0) {
    trail.innerHTML = '<span class="trail-start">Start your selection below</span>';
    return;
  }
  let html = '<span class="trail-item" onclick="goToHistory(-1)">↺ Restart</span>';
  history.forEach((h, i) => {
    html += '<span class="trail-sep">›</span>';
    html += `<span class="trail-item" onclick="goToHistory(${i})">${h.label}</span>`;
  });
  trail.innerHTML = html;
}

function renderQuestion(node) {
  const main = document.getElementById("main");
  const optionsHtml = node.options.map(opt => `
    <button class="option-btn" onclick="choose('${opt.next}', '${escQ(opt.label)}')">
      <span class="option-label">${opt.label}</span>
      ${opt.desc ? `<span class="option-desc">${opt.desc}</span>` : ""}
    </button>
  `).join("");

  main.innerHTML = `
    <div class="question-card">
      <div class="question-step">${node.step || ""}</div>
      <div class="question-text">${node.question}</div>
      ${node.sub ? `<div class="question-sub">${node.sub}</div>` : ""}
      <div class="options-grid ${node.layout || "cols-2"}">${optionsHtml}</div>
    </div>
  `;
}

function renderResult(vehicleKey) {
  const v = VEHICLES[vehicleKey];
  const main = document.getElementById("main");

  const specsHtml = v.specs.map(s => `
    <div class="spec-item">
      <div class="spec-label">${s.label}</div>
      <div class="spec-value">${s.value}</div>
      ${s.note ? `<div class="spec-note">${s.note}</div>` : ""}
    </div>
  `).join("");

  const altsHtml = v.alternatives.map(a =>
    `<span class="alt-chip" onclick="jumpToVehicle('${a}')">${a}</span>`
  ).join("");

  main.innerHTML = `
    <div class="result-card">
      <div class="result-header">
        <div class="result-label">Recommended Vehicle</div>
        <div class="result-vehicle">${v.name}</div>
        <div class="result-fullname">${v.fullname}</div>
        <span class="result-badge ${v.badge}">${v.badgeText}</span>
      </div>
      <div class="result-body">
        <div class="result-summary">${v.summary}</div>
        <div class="specs-grid">${specsHtml}</div>
        ${v.alternatives.length ? `
        <div class="also-consider">
          <h4>Also consider</h4>
          <div class="alt-vehicles">${altsHtml}</div>
        </div>` : ""}
        <button class="restart-btn" onclick="restart()">↺ &nbsp;Start over</button>
      </div>
    </div>
  `;
}

// ─── ACTIONS ─────────────────────────────────────────────────────────────────

function choose(nextId, label) {
  history.push({ nodeId: currentNode, label: label });
  currentNode = nextId;
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function goToHistory(idx) {
  if (idx === -1) { restart(); return; }
  const h = history[idx];
  history = history.slice(0, idx);
  currentNode = h.nodeId;
  render();
}

function restart() {
  history = [];
  currentNode = "start";
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function jumpToVehicle(name) {
  const map = {
    "UCITS": "result_UCITS",
    "Part II UCI": "result_PARTII",
    "SIF": "result_SIF",
    "SICAR": "result_SICAR",
    "RAIF": "result_RAIF",
    "RAIF (SICAR-like)": "result_RAIF",
    "SLP": "result_SLP",
    "SLP / SCSp": "result_SLP",
    "SOPARFI": "result_SOPARFI",
    "SPF": "result_SPF",
    "Life insurance contract": "result_SPF"
  };
  const target = map[name];
  if (target) {
    history.push({ nodeId: currentNode, label: "→ " + name });
    currentNode = target;
    render();
    window.scrollTo({ top: 0, behavior: "smooth" });
  }
}

function escQ(s) {
  return s.replace(/'/g, "\\'");
}

// ─── INIT ────────────────────────────────────────────────────────────────────
